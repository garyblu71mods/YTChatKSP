name: Build YTChatKSP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v1
      with:
        msbuild-version: latest

    - name: Restore NuGet packages
      run: nuget restore YTChatKSP/YTChatKSP.sln

    - name: Build
      run: msbuild YTChatKSP/YTChatKSP.csproj -p:Configuration=Release -p:Platform=AnyCPU

    - name: Check Build Output
      run: |
        if (Test-Path "YTChatKSP/bin/Release/YTChatKSP.dll") {
          Write-Host "✓ Build successful: YTChatKSP.dll created"
          Get-Item "YTChatKSP/bin/Release/YTChatKSP.dll" | Format-List Name, Length
        } else {
          Write-Host "✗ Build failed: DLL not found"
          exit 1
        }

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: YTChatKSP-dll
        path: YTChatKSP/bin/Release/YTChatKSP.dll

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: YTChatKSP/bin/Release/YTChatKSP.dll
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
